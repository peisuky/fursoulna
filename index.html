<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈魂獸設調色盤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=Press+Start+2P&display=swap');

:root{
  --bg:#0d0b1a;
  --card:#16122a;
  --card2:#1e1938;
  --border:#2e2760;
  --accent:#7B6EF6;
  --accent2:#A897FF;
  --accent3:#FF6B9D;
  --text:#e8e3ff;
  --text2:#a09cc8;
  --gold:#FFD700;
  --glow:rgba(123,110,246,0.4);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Zen Kaku Gothic New",sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:2rem 1rem;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(123,110,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(168,151,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(255,107,157,0.05) 0%, transparent 50%);
}

/* ======== CARD ======== */
.card{
  background:var(--card);
  border-radius:20px;
  padding:2rem 1.5rem;
  width:100%;
  max-width:480px;
  border:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(123,110,246,0.1), 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(123,110,246,0.08);
  position:relative;
  overflow:visible;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0.6;
}

/* ======== HEADER ======== */
.quiz-title{
  font-family:"Noto Serif TC",serif;
  font-size:22px;
  font-weight:700;
  text-align:center;
  letter-spacing:0.1em;
  color:var(--text);
  text-shadow:0 0 20px var(--glow);
}
.quiz-subtitle{font-size:13px;color:var(--text2);text-align:center;margin-top:6px;margin-bottom:1.2rem;letter-spacing:0.05em}

/* ======== PROGRESS ======== */
.progress-wrap{
  background:rgba(255,255,255,0.06);
  border-radius:99px;
  height:4px;
  margin-bottom:1.8rem;
  overflow:hidden;
  border:1px solid rgba(123,110,246,0.15);
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--accent3));
  border-radius:99px;
  transition:width 0.4s ease;
  box-shadow:0 0 8px var(--glow);
}

/* ======== INTRO SCREEN ======== */
.intro-block{animation:fadeUp 0.5s ease}
.intro-badge{
  display:inline-block;
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--accent2);
  background:rgba(123,110,246,0.12);
  border:1px solid rgba(123,110,246,0.3);
  border-radius:4px;
  padding:4px 10px;
  margin-bottom:18px;
  text-transform:uppercase;
}
.intro-title{
  font-family:"Noto Serif TC",serif;
  font-size:30px;
  font-weight:700;
  color:var(--text);
  text-align:center;
  line-height:1.3;
  letter-spacing:0.06em;
  text-shadow:0 0 30px rgba(168,151,255,0.5);
  margin-bottom:6px;
}
.intro-title-sub{
  font-size:13px;
  color:var(--accent2);
  text-align:center;
  letter-spacing:0.25em;
  margin-bottom:24px;
  text-transform:uppercase;
}
.intro-divider{
  width:60px;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  margin:0 auto 24px;
}
.intro-preface{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(123,110,246,0.18);
  border-radius:12px;
  padding:18px 20px;
  margin-bottom:24px;
  position:relative;
}
.intro-preface::before{
  content:'◈';
  position:absolute;
  top:-10px;left:50%;transform:translateX(-50%);
  font-size:14px;
  color:var(--accent);
  background:var(--card);
  padding:0 8px;
}
.intro-preface p{
  font-size:14.5px;
  color:var(--text2);
  line-height:1.9;
  text-align:center;
  letter-spacing:0.03em;
}
.intro-preface p strong{
  color:var(--accent2);
  font-weight:700;
}
.intro-equation{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:28px;
  padding:14px 0;
}
.eq-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.eq-num{
  font-size:26px;
  font-weight:700;
  color:var(--accent2);
  line-height:1;
  letter-spacing:0.02em;
}
.eq-label{
  font-size:11px;
  color:var(--text2);
  letter-spacing:0.08em;
}
.eq-op{
  font-size:18px;
  color:rgba(123,110,246,0.45);
  font-weight:300;
  padding-bottom:14px;
}
.start-btn{
  font-family:"Noto Serif TC",serif;
  font-size:16px;
  font-weight:700;
  letter-spacing:0.18em;
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid var(--accent);
  background:linear-gradient(135deg, var(--accent) 0%, #9B8EFF 50%, var(--accent3) 100%);
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.2s ease;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
  box-shadow:0 4px 20px rgba(123,110,246,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
  animation:startPulse 2s ease-in-out infinite;
}
.start-btn::before{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  transform:translateX(-100%);
  animation:shine 3s ease-in-out infinite;
}
.start-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(123,110,246,0.6), 0 0 0 1px rgba(255,255,255,0.15) inset;
}
.start-btn:active{transform:translateY(0)}
@keyframes startPulse{
  0%,100%{opacity:1;box-shadow:0 4px 20px rgba(123,110,246,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset}
  50%{opacity:0.72;box-shadow:0 2px 10px rgba(123,110,246,0.2), 0 0 0 1px rgba(255,255,255,0.06) inset}
}
@keyframes shine{
  0%{transform:translateX(-100%) rotate(0deg)}
  100%{transform:translateX(100%) rotate(0deg)}
}
.start-hint{
  font-size:12px;
  color:var(--text2);
  text-align:center;
  margin-top:12px;
  letter-spacing:0.08em;
  opacity:0.7;
}
.test-btn{
  margin-top:14px;
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px dashed rgba(123,110,246,0.35);
  background:rgba(123,110,246,0.07);
  color:var(--text2);
  font-size:12px;
  letter-spacing:0.08em;
  cursor:pointer;
  transition:all 0.2s ease;
}

/* ======== QUESTION ======== */
.question-block{animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:12px;color:var(--text2);letter-spacing:0.12em;margin-bottom:6px}
.q-part{
  display:inline-block;
  font-size:12px;
  color:var(--accent2);
  background:rgba(123,110,246,0.12);
  border:1px solid rgba(123,110,246,0.25);
  border-radius:4px;
  padding:3px 10px;
  margin-bottom:12px;
  letter-spacing:0.05em;
}
.q-text{font-size:19px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:1.25rem}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{
  width:100%;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 14px;
  text-align:left;
  cursor:pointer;
  transition:all 0.18s ease;
}
.opt-btn:hover:not(.selected){
  border-color:rgba(123,110,246,0.5);
  background:rgba(123,110,246,0.08);
  transform:translateY(-1px);
}
.opt-btn.selected{
  border:1.5px solid var(--accent);
  background:rgba(123,110,246,0.2);
  transform:translateY(-1px);
  box-shadow:0 0 12px rgba(123,110,246,0.3);
}
.opt-btn.selected .opt-letter{color:var(--accent2)}
.opt-btn.selected .opt-text{color:var(--text)}
.opt-letter{font-size:11px;font-weight:700;color:rgba(160,156,200,0.5);letter-spacing:0.12em;display:block;margin-bottom:5px;transition:color 0.18s}
.opt-text{font-size:14px;color:var(--text2);line-height:1.5;display:block;transition:color 0.18s}

/* ======== HINT ======== */
.hint-wrap{min-height:22px;margin-top:1rem;text-align:center}
.hint-text{font-size:13px;color:var(--accent2);display:inline-block;overflow:hidden;white-space:nowrap;border-right:2px solid var(--accent2);width:0}
.hint-text.typing{animation:typing 1.2s steps(14,end) forwards,blink 0.6s step-end 3}
.hint-text.done{width:13em;border-right:2px solid transparent}
@keyframes typing{from{width:0}to{width:13em}}
@keyframes blink{0%,100%{border-color:var(--accent2)}50%{border-color:transparent}}

/* ======== NAV ======== */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.nav-btn{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:14px;
  padding:10px 20px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  transition:all 0.15s ease;
  letter-spacing:0.05em;
}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,0.05);color:var(--text)}
.nav-btn:disabled{opacity:0.25;cursor:default}
.nav-btn.primary{
  background:rgba(30,25,56,1);
  color:var(--text);
  border-color:var(--border);
}
.nav-btn.primary:hover:not(:disabled){background:rgba(50,40,90,1);border-color:rgba(123,110,246,0.4)}
.nav-btn.primary:disabled{opacity:0.25}
.nav-btn.primary.ready{
  background:linear-gradient(135deg,var(--accent),#9B8EFF);
  border-color:transparent;
  color:#fff;
  animation:pulse 1.4s ease-in-out infinite;
  box-shadow:0 0 16px rgba(123,110,246,0.4);
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,110,246,0.4)}50%{box-shadow:0 0 0 7px rgba(123,110,246,0)}}

/* ======== RESULT ======== */
.result-block{animation:fadeUp 0.4s ease}
.cert-label{font-size:11px;letter-spacing:0.2em;color:var(--text2);text-align:center;margin-bottom:6px;text-transform:uppercase;opacity:0.6}
.result-title{font-family:"Noto Serif TC",serif;font-size:24px;font-weight:700;color:var(--text);text-align:center;text-shadow:0 0 20px var(--glow)}
.result-sub{font-size:13px;color:var(--text2);text-align:center;margin-top:4px;margin-bottom:1.5rem;letter-spacing:0.04em}
.canvas-outer{
  position:relative;
  width:100%;
  margin:0 auto 1.5rem;
  overflow:visible;
  box-sizing:border-box;
}
.canvas-wrap{
  width:100%;
  aspect-ratio:1/1;
  margin:0 auto;
  position:relative;border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  box-shadow:0 0 30px rgba(123,110,246,0.2);
}
.canvas-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
/* 拉線標示 */
.anno-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.anno-label{position:absolute;font-size:11px;font-weight:600;color:var(--accent2);
  white-space:nowrap;letter-spacing:0.05em;}
.parts-list{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;background:rgba(255,255,255,0.02)}
.part-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(46,39,96,0.5)}
.part-row:last-child{border-bottom:none}
.part-icon{font-size:15px;width:28px;flex-shrink:0}
.part-name{font-size:13px;color:var(--text2);width:60px;flex-shrink:0}
.part-answer{font-size:13px;color:rgba(160,156,200,0.7);flex:1}
.part-value{font-size:14px;font-weight:700;color:var(--accent2);margin-left:8px}
.restart-btn{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:14px;
  padding:11px 32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  display:block;
  margin:0 auto;
  transition:all 0.15s;
  letter-spacing:0.05em;
}
.restart-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}

/* ======== PERSONALITY SUMMARY ======== */
.persona-summary{
  margin-bottom:1.5rem;
  border:1px solid rgba(123,110,246,0.3);
  border-radius:16px;
  overflow:hidden;
  background:linear-gradient(135deg, rgba(123,110,246,0.07) 0%, rgba(255,107,157,0.05) 100%);
  position:relative;
}
.persona-summary::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent3),transparent);
  opacity:0.6;
}
.persona-header{
  padding:16px 18px 10px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}
.persona-type-code{
  font-size:10px;
  letter-spacing:0.2em;
  color:var(--text2);
  opacity:0.6;
  text-transform:uppercase;
  margin-bottom:4px;
}
.persona-title{
  font-family:"Noto Serif TC",serif;
  font-size:22px;
  font-weight:700;
  color:var(--text);
  letter-spacing:0.06em;
  text-shadow:0 0 16px var(--glow);
  line-height:1.2;
}
.persona-rarity{
  flex-shrink:0;
  font-size:10px;
  letter-spacing:0.12em;
  color:var(--gold);
  background:rgba(255,215,0,0.1);
  border:1px solid rgba(255,215,0,0.25);
  border-radius:4px;
  padding:4px 8px;
  text-transform:uppercase;
  white-space:nowrap;
}
.persona-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:0 18px 14px;
}
.p-tag{
  font-size:11px;
  padding:4px 10px;
  border-radius:99px;
  letter-spacing:0.06em;
  border:1px solid;
}
.p-tag.social{color:#A897FF;border-color:rgba(168,151,255,0.35);background:rgba(168,151,255,0.08)}
.p-tag.instinct{color:#FF6B9D;border-color:rgba(255,107,157,0.35);background:rgba(255,107,157,0.08)}
.p-tag.stress{color:#7BD4F5;border-color:rgba(123,212,245,0.35);background:rgba(123,212,245,0.08)}
.p-tag.vibe{color:#B8F5A0;border-color:rgba(184,245,160,0.35);background:rgba(184,245,160,0.08)}
.persona-divider{height:1px;background:rgba(123,110,246,0.15);margin:0 18px}
.persona-desc{
  padding:14px 18px 18px;
  font-size:14px;
  color:var(--text2);
  line-height:1.9;
  letter-spacing:0.03em;
}
.persona-desc strong{color:var(--accent2)}
/* skeleton loading */
.skel{
  background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;
  animation:skelShimmer 1.4s ease-in-out infinite;
  border-radius:6px;
  height:14px;
  margin-bottom:8px;
}
@keyframes skelShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.name-input-wrap{margin-bottom:1.5rem}
.name-label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;text-align:center;letter-spacing:0.06em}
.name-input{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:15px;
  width:100%;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text);
  box-sizing:border-box;
  text-align:center;
  outline:none;
  transition:border-color 0.15s;
}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--text2);opacity:0.4}
.action-row{display:flex;gap:10px;margin-bottom:1.5rem}
.save-btn,.share-btn{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:14px;
  padding:10px 0;
  border-radius:8px;
  cursor:pointer;
  flex:1;
  transition:all 0.15s;
  border:1px solid;
  letter-spacing:0.05em;
}
.save-btn{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(123,110,246,0.4)}
.save-btn:hover{opacity:0.88}
.share-btn{background:transparent;color:var(--accent2);border-color:rgba(123,110,246,0.35)}
.share-btn:hover{background:rgba(123,110,246,0.1)}
</style>
</head>
<body>
<div class="card">
  <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div id="content"></div>
</div>
<script>
const LAYERS = {
  "basecolor": "layers/basecolor.png",
  "body": "layers/body.png",
  "mouth_normal": "layers/mouth_normal.png",
  "mouth_v": "layers/mouth_v.png",
  "mouth_cat": "layers/mouth_cat.png",
  "mouth_line": "layers/mouth_line.png",
  "outfit_harness": "layers/outfit_harness.png",
  "outfit_suits": "layers/outfit_suits.png",
  "outfit_tanktop": "layers/outfit_tanktop.png",
  "outfit_underwear": "layers/outfit_underwear.png",
  "accessory_collar": "layers/accessory_collar.png",
  "accessory_hunter": "layers/accessory_hunter.png",
  "accessory_bone": "layers/accessory_bone.png",
  "ear_bear": "layers/ear_bear.png",
  "ear_cat": "layers/ear_cat.png",
  "ear_deer": "layers/ear_deer.png",
  "ear_dog": "layers/ear_dog.png",
  "eyebrow_1": "layers/eyebrow_1.png",
  "eyebrow_2": "layers/eyebrow_2.png",
  "eyebrow_3": "layers/eyebrow_3.png",
  "eyebrow_4": "layers/eyebrow_4.png",
  "eye_lazy": "layers/eye_lazy.png",
  "eye_round": "layers/eye_round.png",
  "eye_shock": "layers/eye_shock.png",
  "eye_smile": "layers/eye_smile.png",
  "hair_1": "layers/hair_1.png",
  "hair_2": "layers/hair_2.png",
  "hair_3": "layers/hair_3.png",
  "hair_4": "layers/hair_4.png",
  "head_1": "layers/head_1.png",
  "head_2": "layers/head_2.png",
  "head_3": "layers/head_3.png",
  "head_4": "layers/head_4.png",
  "horn_bull": "layers/horn_bull.png",
  "horn_deer": "layers/horn_deer.png",
  "horn_standear": "layers/horn_standear.png",
  "nose_bull": "layers/nose_bull.png",
  "nose_cat": "layers/nose_cat.png",
  "nose_dog": "layers/nose_dog.png",
  "tail_bull": "layers/tail_bull.png",
  "tail_cat": "layers/tail_cat.png",
  "tail_dog": "layers/tail_dog.png",
};

// 圖層顯示順序（底→頂），與PSD一致
const LAYER_ORDER = ["tail_dog", "tail_bull", "tail_cat", "body", "outfit_harness", "outfit_suits", "outfit_tanktop", "outfit_underwear", "horn_bull", "horn_deer", "ear_deer", "accessory_collar", "head_1", "head_2", "head_3", "head_4", "horn_standear", "ear_dog", "ear_cat", "ear_bear", "hair_1", "hair_2", "hair_3", "hair_4", "eye_round", "eye_lazy", "eye_shock", "eye_smile", "eyebrow_1", "eyebrow_2", "eyebrow_3", "eyebrow_4", "nose_cat", "nose_bull", "nose_dog", "mouth_normal", "mouth_v", "mouth_cat", "mouth_line", "accessory_hunter", "accessory_bone"];

const questions=[
  {part:"耳朵",icon:"👂",text:"朋友突然從背後叫你，你的反應是？",options:[
    {label:"立刻轉頭確認",result:"垂耳（犬系）",layer:"ear_dog"},
    {label:"眼神飄過去但身體不動",result:"立耳（貓系）",layer:"ear_cat"},

const TOUCH_TAG = ["高接觸耐受","低接觸偏好","物理衝擊派","物理迴避"];

function derivePersonality(parts){
  const earIdx  = answers[0]; // Q1 耳朵
  const hornIdx = answers[4]; // Q5 角
  const headIdx = answers[5]; // Q6 頭型
  const stressIdx = answers[7]; // Q8 毛色（空間風格）
  const senseIdx  = answers[3]; // Q4 鼻子（感官）
  const touchIdx  = answers[6]; // Q7 眉毛（外在印象）
  const vibeIdx   = answers[9]; // Q10 配件（氛圍）
  const titleKey = earIdx+","+hornIdx;
  const title = TITLE_MAP[titleKey] || "未知原型";
  // 稀有度：全部選0或3算稀有，其他往下遞減
  const extremeCount = answers.filter(a=>a===0||a===3).length;
  const rarityIdx = extremeCount>=7?0:extremeCount>=4?1:extremeCount>=2?2:3;
  const tags = [
    {cls:"social",  text: STRESS_TAG[stressIdx]},
    {cls:"instinct",text: SENSE_TAG[senseIdx]},
    {cls:"stress",  text: TOUCH_TAG[touchIdx]},
    {cls:"vibe",    text: VIBE_TAG[vibeIdx]},
  ];  return {title, rarityIdx, tags};
}

function saveImage(){
  const wrap = document.getElementById("fursona-canvas");
  const name = (document.getElementById("fursona-name")||{}).value||"";
  const persona = derivePersonality([]);
  const desc = fetchPersonaDesc();
  const typeCode = "TYPE · "+answers.slice(0,5).join("-");
  const W=900,H=490,topH=310;
  const canvas=document.createElement("canvas");
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");

  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }
  function wrapText(text,x,y,maxW,lineH){
    let line="";
    for(const c of text){
      if(ctx.measureText(line+c).width>maxW&&line){ctx.fillText(line,x,y);y+=lineH;line=c;}
      else line+=c;
    }
    if(line)ctx.fillText(line,x,y);
  }

  function drawCard(){
    ctx.save();
    rr(0,0,W,H,20); ctx.clip();

    // background
    ctx.fillStyle="#0d0b1a"; ctx.fillRect(0,0,W,H);
    const grd=ctx.createLinearGradient(0,0,W,topH);
    grd.addColorStop(0,"#16122a"); grd.addColorStop(1,"#1e1938");
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,topH);

    // character image 256x256
    const IS=256,IX=32,IY=(topH-IS)/2|0;
    ctx.save();
    rr(IX,IY,IS,IS,12); ctx.clip();
    const imgs=wrap.querySelectorAll("img");
    imgs.forEach(img=>ctx.drawImage(img,IX,IY,IS,IS));
    ctx.restore();
    ctx.strokeStyle="#2e2760"; ctx.lineWidth=1;
    rr(IX,IY,IS,IS,12); ctx.stroke();

    // right panel
    const TX=IX+IS+24,TW=W-TX-32;
    let TY=IY+4;

    ctx.font="11px sans-serif"; ctx.fillStyle="rgba(160,156,200,0.5)";
    ctx.fillText("FURSONA NAME",TX,TY+11); TY+=28;

    ctx.font="bold 26px 'Noto Serif TC',serif"; ctx.fillStyle="#e8e3ff";
    ctx.fillText(name||"未命名",TX,TY+24); TY+=44;

    ctx.font="10px sans-serif"; ctx.fillStyle="rgba(160,156,200,0.4)";
    ctx.fillText(typeCode,TX,TY+10); TY+=22;

    ctx.font="bold 15px 'Noto Serif TC',serif"; ctx.fillStyle="#A897FF";
    ctx.fillText(persona.title,TX,TY+14); TY+=28;

    const rTxt=["✦ RARE","◈ UNCOMMON","○ UNCOMMON","· COMMON"][persona.rarityIdx];
    ctx.font="9px sans-serif";
    const bw=ctx.measureText(rTxt).width+16;
    ctx.fillStyle="rgba(255,215,0,0.1)"; rr(TX,TY,bw,20,4); ctx.fill();
    ctx.strokeStyle="rgba(255,215,0,0.25)"; ctx.lineWidth=1; rr(TX,TY,bw,20,4); ctx.stroke();
    ctx.fillStyle="#FFD700"; ctx.fillText(rTxt,TX+8,TY+13); TY+=32;

    // tags 2x2
    const COLS=["#A897FF","#FF6B9D","#7BD4F5","#B8F5A0"];
    const BGS=["rgba(168,151,255,0.08)","rgba(255,107,157,0.08)","rgba(123,212,245,0.08)","rgba(184,245,160,0.08)"];
    const BDS=["rgba(168,151,255,0.35)","rgba(255,107,157,0.35)","rgba(123,212,245,0.35)","rgba(184,245,160,0.35)"];
    const tagW=(TW-8)/2,tagH=24,tagR=tagH/2;
    ctx.font="11px sans-serif";
    persona.tags.forEach((tag,i)=>{
      const tx=TX+(i%2)*(tagW+8),ty=TY+Math.floor(i/2)*(tagH+6);
      ctx.fillStyle=BGS[i]; rr(tx,ty,tagW,tagH,tagR); ctx.fill();
      ctx.strokeStyle=BDS[i]; ctx.lineWidth=1; rr(tx,ty,tagW,tagH,tagR); ctx.stroke();
      ctx.fillStyle=COLS[i]; ctx.textAlign="center";
      ctx.fillText(tag.text,tx+tagW/2,ty+16); ctx.textAlign="left";
    });

    // divider
    ctx.strokeStyle="rgba(46,39,96,0.6)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(32,topH); ctx.lineTo(W-32,topH); ctx.stroke();

    // description
    ctx.font="14px 'Zen Kaku Gothic New',sans-serif"; ctx.fillStyle="#a09cc8";
    wrapText(desc,32,topH+30,W-64,26);

    // hashtags
    ctx.font="11px sans-serif"; ctx.fillStyle="#7B6EF6";
    ctx.fillText("#靈魂獸設調色盤  #FurSOULna  #Furry  #FurryArt",32,H-44);

    // watermark
    ctx.font="10px sans-serif"; ctx.fillStyle="rgba(160,156,200,0.35)";
    ctx.textAlign="right"; ctx.fillText("made by Peisuky",W-16,H-18); ctx.textAlign="left";

    ctx.restore();
    const a=document.createElement("a");
    a.download=(name||"fursona")+"_card.png";
    a.href=canvas.toDataURL("image/png"); a.click();
  }

  const imgs=wrap.querySelectorAll("img");
  if(imgs.length===0){drawCard();return;}
  let loaded=0;
  imgs.forEach(img=>{
    if(img.complete){loaded++;if(loaded===imgs.length)drawCard();}
    else{img.onload=()=>{loaded++;if(loaded===imgs.length)drawCard();};}
  });
}

function encodeResultURL(){
  history.replaceState(null,"",location.pathname+"#r="+answers.join(""));
}

function copyLink(){
  encodeResultURL();
  navigator.clipboard.writeText(location.href).then(()=>{
    const btn=document.querySelector(".copy-link-btn");
    const orig=btn.textContent;
    btn.textContent="✓ 已複製！";
    setTimeout(()=>{btn.textContent=orig;},2000);
  }).catch(()=>alert(location.href));
}

function initFromURL(){
  const m=location.hash.match(/^#r=(\d+)$/);
  if(m&&m[1].length===questions.length){
    const parsed=m[1].split("").map(Number);
    if(parsed.every((a,i)=>a>=0&&a<questions[i].options.length)){
      answers=parsed; current=questions.length; introShown=true;
    }
  }
}

function restart(){current=0;answers=[];introShown=false;history.replaceState(null,"",location.pathname);render();}
initFromURL();
render();
</script>
