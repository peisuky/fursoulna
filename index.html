<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈魂獸設調色盤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;700&family=Press+Start+2P&display=swap');

:root{
  --bg:#0d0b1a;
  --card:#16122a;
  --card2:#1e1938;
  --border:#2e2760;
  --accent:#7B6EF6;
  --accent2:#A897FF;
  --accent3:#FF6B9D;
  --text:#e8e3ff;
  --text2:#a09cc8;
  --gold:#FFD700;
  --glow:rgba(123,110,246,0.4);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Zen Kaku Gothic New",sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:2rem 1rem;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(123,110,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(168,151,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(255,107,157,0.05) 0%, transparent 50%);
}

/* ======== CARD ======== */
.card{
  background:var(--card);
  border-radius:20px;
  padding:2rem 1.5rem;
  width:100%;
  max-width:480px;
  border:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(123,110,246,0.1), 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(123,110,246,0.08);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0.6;
}

/* ======== HEADER ======== */
.quiz-title{
  font-family:"Noto Serif TC",serif;
  font-size:22px;
  font-weight:700;
  text-align:center;
  letter-spacing:0.1em;
  color:var(--text);
  text-shadow:0 0 20px var(--glow);
}
.quiz-subtitle{font-size:13px;color:var(--text2);text-align:center;margin-top:6px;margin-bottom:1.2rem;letter-spacing:0.05em}

/* ======== PROGRESS ======== */
.progress-wrap{
  background:rgba(255,255,255,0.06);
  border-radius:99px;
  height:4px;
  margin-bottom:1.8rem;
  overflow:hidden;
  border:1px solid rgba(123,110,246,0.15);
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--accent3));
  border-radius:99px;
  transition:width 0.4s ease;
  box-shadow:0 0 8px var(--glow);
}

/* ======== INTRO SCREEN ======== */
.intro-block{animation:fadeUp 0.5s ease}
.intro-badge{
  display:inline-block;
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--accent2);
  background:rgba(123,110,246,0.12);
  border:1px solid rgba(123,110,246,0.3);
  border-radius:4px;
  padding:4px 10px;
  margin-bottom:18px;
  text-transform:uppercase;
}
.intro-title{
  font-family:"Noto Serif TC",serif;
  font-size:30px;
  font-weight:700;
  color:var(--text);
  text-align:center;
  line-height:1.3;
  letter-spacing:0.06em;
  text-shadow:0 0 30px rgba(168,151,255,0.5);
  margin-bottom:6px;
}
.intro-title-sub{
  font-size:13px;
  color:var(--accent2);
  text-align:center;
  letter-spacing:0.25em;
  margin-bottom:24px;
  text-transform:uppercase;
}
.intro-divider{
  width:60px;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  margin:0 auto 24px;
}
.intro-preface{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(123,110,246,0.18);
  border-radius:12px;
  padding:18px 20px;
  margin-bottom:24px;
  position:relative;
}
.intro-preface::before{
  content:'◈';
  position:absolute;
  top:-10px;left:50%;transform:translateX(-50%);
  font-size:14px;
  color:var(--accent);
  background:var(--card);
  padding:0 8px;
}
.intro-preface p{
  font-size:14.5px;
  color:var(--text2);
  line-height:1.9;
  text-align:center;
  letter-spacing:0.03em;
}
.intro-preface p strong{
  color:var(--accent2);
  font-weight:700;
}
.intro-equation{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:28px;
  padding:14px 0;
}
.eq-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.eq-num{
  font-size:26px;
  font-weight:700;
  color:var(--accent2);
  line-height:1;
  letter-spacing:0.02em;
}
.eq-label{
  font-size:11px;
  color:var(--text2);
  letter-spacing:0.08em;
}
.eq-op{
  font-size:18px;
  color:rgba(123,110,246,0.45);
  font-weight:300;
  padding-bottom:14px;
}
.start-btn{
  font-family:"Noto Serif TC",serif;
  font-size:16px;
  font-weight:700;
  letter-spacing:0.18em;
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid var(--accent);
  background:linear-gradient(135deg, var(--accent) 0%, #9B8EFF 50%, var(--accent3) 100%);
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.2s ease;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
  box-shadow:0 4px 20px rgba(123,110,246,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
  animation:startPulse 2s ease-in-out infinite;
}
.start-btn::before{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  transform:translateX(-100%);
  animation:shine 3s ease-in-out infinite;
}
.start-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(123,110,246,0.6), 0 0 0 1px rgba(255,255,255,0.15) inset;
}
.start-btn:active{transform:translateY(0)}
@keyframes startPulse{
  0%,100%{opacity:1;box-shadow:0 4px 20px rgba(123,110,246,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset}
  50%{opacity:0.72;box-shadow:0 2px 10px rgba(123,110,246,0.2), 0 0 0 1px rgba(255,255,255,0.06) inset}
}
@keyframes shine{
  0%{transform:translateX(-100%) rotate(0deg)}
  100%{transform:translateX(100%) rotate(0deg)}
}
.start-hint{
  font-size:12px;
  color:var(--text2);
  text-align:center;
  margin-top:12px;
  letter-spacing:0.08em;
  opacity:0.7;
}
.test-btn{
  margin-top:14px;
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px dashed rgba(123,110,246,0.35);
  background:rgba(123,110,246,0.07);
  color:var(--text2);
  font-size:12px;
  letter-spacing:0.08em;
  cursor:pointer;
  transition:all 0.2s ease;
}

/* ======== QUESTION ======== */
.question-block{animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:12px;color:var(--text2);letter-spacing:0.12em;margin-bottom:6px}
.q-part{
  display:inline-block;
  font-size:12px;
  color:var(--accent2);
  background:rgba(123,110,246,0.12);
  border:1px solid rgba(123,110,246,0.25);
  border-radius:4px;
  padding:3px 10px;
  margin-bottom:12px;
  letter-spacing:0.05em;
}
.q-text{font-size:19px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:1.25rem}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-btn{
  width:100%;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 14px;
  text-align:left;
  cursor:pointer;
  transition:all 0.18s ease;
}
.opt-btn:hover:not(.selected){
  border-color:rgba(123,110,246,0.5);
  background:rgba(123,110,246,0.08);
  transform:translateY(-1px);
}
.opt-btn.selected{
  border:1.5px solid var(--accent);
  background:rgba(123,110,246,0.2);
  transform:translateY(-1px);
  box-shadow:0 0 12px rgba(123,110,246,0.3);
}
.opt-btn.selected .opt-letter{color:var(--accent2)}
.opt-btn.selected .opt-text{color:var(--text)}
.opt-letter{font-size:11px;font-weight:700;color:rgba(160,156,200,0.5);letter-spacing:0.12em;display:block;margin-bottom:5px;transition:color 0.18s}
.opt-text{font-size:14px;color:var(--text2);line-height:1.5;display:block;transition:color 0.18s}

/* ======== HINT ======== */
.hint-wrap{min-height:22px;margin-top:1rem;text-align:center}
.hint-text{font-size:13px;color:var(--accent2);display:inline-block;overflow:hidden;white-space:nowrap;border-right:2px solid var(--accent2);width:0}
.hint-text.typing{animation:typing 1.2s steps(14,end) forwards,blink 0.6s step-end 3}
.hint-text.done{width:13em;border-right:2px solid transparent}
@keyframes typing{from{width:0}to{width:13em}}
@keyframes blink{0%,100%{border-color:var(--accent2)}50%{border-color:transparent}}

/* ======== NAV ======== */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.nav-btn{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:14px;
  padding:10px 20px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  transition:all 0.15s ease;
  letter-spacing:0.05em;
}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,0.05);color:var(--text)}
.nav-btn:disabled{opacity:0.25;cursor:default}
.nav-btn.primary{
  background:rgba(30,25,56,1);
  color:var(--text);
  border-color:var(--border);
}
.nav-btn.primary:hover:not(:disabled){background:rgba(50,40,90,1);border-color:rgba(123,110,246,0.4)}
.nav-btn.primary:disabled{opacity:0.25}
.nav-btn.primary.ready{
  background:linear-gradient(135deg,var(--accent),#9B8EFF);
  border-color:transparent;
  color:#fff;
  animation:pulse 1.4s ease-in-out infinite;
  box-shadow:0 0 16px rgba(123,110,246,0.4);
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,110,246,0.4)}50%{box-shadow:0 0 0 7px rgba(123,110,246,0)}}

/* ======== RESULT ======== */
.result-block{animation:fadeUp 0.4s ease}
.cert-label{font-size:11px;letter-spacing:0.2em;color:var(--text2);text-align:center;margin-bottom:6px;text-transform:uppercase;opacity:0.6}
.result-title{font-family:"Noto Serif TC",serif;font-size:24px;font-weight:700;color:var(--text);text-align:center;text-shadow:0 0 20px var(--glow)}
.result-sub{font-size:13px;color:var(--text2);text-align:center;margin-top:4px;margin-bottom:1.5rem;letter-spacing:0.04em}
.canvas-outer{
  position:relative;
  width:400px;
  margin:0 auto 1.5rem;
  overflow:visible;
}
.canvas-wrap{
  width:400px;height:400px;margin:0 auto;
  position:relative;border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  box-shadow:0 0 30px rgba(123,110,246,0.2);
}
.canvas-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
/* 拉線標示 */
.anno-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.anno-label{position:absolute;font-size:11px;font-weight:600;color:var(--accent2);
  white-space:nowrap;letter-spacing:0.05em;}
.parts-list{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;background:rgba(255,255,255,0.02)}
.part-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(46,39,96,0.5)}
.part-row:last-child{border-bottom:none}
.part-icon{font-size:15px;width:28px;flex-shrink:0}
.part-name{font-size:13px;color:var(--text2);width:60px;flex-shrink:0}
.part-answer{font-size:13px;color:rgba(160,156,200,0.7);flex:1}
.part-value{font-size:14px;font-weight:700;color:var(--accent2);margin-left:8px}
.restart-btn{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:14px;
  padding:11px 32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  display:block;
  margin:0 auto;
  transition:all 0.15s;
  letter-spacing:0.05em;
}
.restart-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.name-input-wrap{margin-bottom:1.5rem}
.name-label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;text-align:center;letter-spacing:0.06em}
.name-input{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:15px;
  width:100%;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text);
  box-sizing:border-box;
  text-align:center;
  outline:none;
  transition:border-color 0.15s;
}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--text2);opacity:0.4}
.action-row{display:flex;gap:10px;margin-bottom:1.5rem}
.save-btn,.share-btn{
  font-family:"Zen Kaku Gothic New",sans-serif;
  font-size:14px;
  padding:10px 0;
  border-radius:8px;
  cursor:pointer;
  flex:1;
  transition:all 0.15s;
  border:1px solid;
  letter-spacing:0.05em;
}
.save-btn{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(123,110,246,0.4)}
.save-btn:hover{opacity:0.88}
.share-btn{background:transparent;color:var(--accent2);border-color:rgba(123,110,246,0.35)}
.share-btn:hover{background:rgba(123,110,246,0.1)}
</style>
</head>
<body>
<div class="card">
  <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div id="content"></div>
</div>
<script>
const LAYERS = {
  "basecolor": "layers/basecolor.png",
  "body": "layers/body.png",
  "ear_bear": "layers/ear_bear.png",
  "ear_cat": "layers/ear_cat.png",
  "ear_deer": "layers/ear_deer.png",
  "ear_dog": "layers/ear_dog.png",
  "eye_lazy": "layers/eye_lazy.png",
  "eye_round": "layers/eye_round.png",
  "eye_shock": "layers/eye_shock.png",
  "eye_smile": "layers/eye_smile.png",
  "head": "layers/head.png",
  "horn_bull": "layers/horn_bull.png",
  "horn_deer": "layers/horn_deer.png",
  "horn_standear": "layers/horn_standear.png",
  "nose_bull": "layers/nose_bull.png",
  "nose_cat": "layers/nose_cat.png",
  "nose_dog": "layers/nose_dog.png",
  "tail_bull": "layers/tail_bull.png",
  "tail_cat": "layers/tail_cat.png",
  "tail_dog": "layers/tail_dog.png",
};

// 圖層顯示順序（底→頂），與PSD一致
const LAYER_ORDER = ["tail_dog", "tail_bull", "tail_cat", "body", "horn_bull", "horn_deer", "head", "horn_standear", "ear_dog", "ear_cat", "ear_deer", "ear_bear", "eye_round", "eye_lazy", "eye_shock", "eye_smile", "nose_cat", "nose_bull", "nose_dog"];

const questions=[
  {part:"耳朵",icon:"👂",text:"朋友突然從背後叫你，你的反應是？",options:[
    {label:"立刻轉頭確認",result:"垂耳（犬系）",layer:"ear_dog"},
    {label:"眼神飄過去但身體不動",result:"立耳（貓系）",layer:"ear_cat"},
    {label:"愣了一秒才回神",result:"長耳（鹿系）",layer:"ear_deer"},
    {label:"「嗯？」慢慢抬頭",result:"圓耳（熊系）",layer:"ear_bear"}
  ]},
  {part:"尾巴",icon:"🐾",text:"你在網路上看到喜歡的東西會怎麼做？",options:[
    {label:"瘋狂轉發＋tag朋友",result:"蓬鬆大尾（犬系）",layer:"tail_dog"},
    {label:"默默收藏不說話",result:"纖細長尾（貓系）",layer:"tail_cat"},
    {label:"看完記在心裡，不外顯",result:"細鞭尾（牛系）",layer:"tail_bull"},
    {label:"根本不追蹤任何東西",result:"無尾",layer:null}
  ]},
  {part:"眼睛",icon:"👁️",text:"你觀察一個新認識的人，最先注意到什麼？",options:[
    {label:"整體氛圍和體型",result:"圓瞳",layer:"eye_round"},
    {label:"眼神和小動作",result:"縱瞳",layer:"eye_shock"},
    {label:"表情和眼睛",result:"大圓眼",layer:"eye_smile"},
    {label:"說話的方式和用詞",result:"下垂眼",layer:"eye_lazy"}
  ]},
  {part:"鼻子",icon:"👃",text:"走進一個陌生的空間，你第一個感知是？",options:[
    {label:"味道",result:"大黑獸鼻",layer:"nose_bull"},
    {label:"光線和顏色",result:"小三角鼻",layer:"nose_cat"},
    {label:"溫度和濕度",result:"扁圓鼻",layer:"nose_cat"},
    {label:"人的視線",result:"人鼻",layer:null}
  ]},
  {part:"角",icon:"🦌",text:"你在群體中通常是什麼角色？",options:[
    {label:"自然成為話題中心",result:"分叉鹿角",layer:"horn_deer"},
    {label:"負責定調氣氛",result:"彎角",layer:"hron_bull"},
    {label:"默默觀察然後突然插嘴",result:"獸耳加強版",layer:"horn_standear"},
    {label:"跟著走就好",result:"無角",layer:null}
  ]},
  {part:"體型",icon:"💪",text:"你面對壓力的方式？",options:[
    {label:"正面剛，直接解決",result:"壯碩型",layer:null},
    {label:"扛著不說，自己消化",result:"寬肩厚實型",layer:null},
    {label:"快速分析然後行動",result:"精實型",layer:null},
    {label:"先躲起來再說",result:"纖細型",layer:null}
  ]},
  {part:"手爪",icon:"🐾",text:"你喜歡的肢體接觸方式？",options:[
    {label:"摸頭、拍肩、牽手都OK",result:"肉球爪",layer:null},
    {label:"不太喜歡被碰，握手就好",result:"蹄感指節",layer:null},
    {label:"熊抱派，用力才有感",result:"利爪",layer:null},
    {label:"保持物理距離謝謝",result:"人手",layer:null}
  ]},
  {part:"毛色",icon:"🎨",text:"你的房間或桌面風格？",options:[
    {label:"木質暖色、有點亂但有溫度",result:"暖棕／米色系",layer:null},
    {label:"深色冷調、極簡",result:"冷灰／藍色系",layer:null},
    {label:"黑白對比、乾淨俐落",result:"黑白色系",layer:null},
    {label:"繽紛花俏、貼紙到處貼",result:"繽紛花色",layer:null}
  ]},
  {part:"花紋",icon:"✨",text:"你的穿衣風格？",options:[
    {label:"小細節控，局部圖案點綴",result:"斑點紋",layer:null},
    {label:"整體有型，喜歡線條感",result:"條紋／狼紋",layer:null},
    {label:"素色為主，版型決定一切",result:"純色無紋",layer:null},
    {label:"大面積花色，存在感強",result:"大塊花斑",layer:null}
  ]},
  {part:"配件",icon:"🔮",text:"你希望別人看到你的獸設時，第一印象是？",options:[
    {label:"可愛，讓人想靠近",result:"鈴鐺項圈",layer:null},
    {label:"野性，有點危險感",result:"獵人角掛件",layer:null},
    {label:"呆萌，看起來好欺負但其實不是",result:"骨頭髮飾",layer:null},
    {label:"神秘，讓人猜不透",result:"無配件",layer:null}
  ]}
];

let current=0,answers=[],introShown=false;

function showIntro(){
  document.getElementById("progress").style.width="0%";
  document.getElementById("content").innerHTML=`
    <div class="intro-block">
      <div style="text-align:center;margin-bottom:20px">
        <div class="intro-badge">✦ FURSONA CREATION ✦</div>
        <div class="intro-title">靈魂獸設<br>調色盤</div>
        <div class="intro-title-sub">FurSOULna Palette</div>
        <div class="intro-divider"></div>
      </div>
      <div class="intro-preface">
        <p>
          你的靈魂深處<strong>住著一隻獸</strong>。<br><br>
          它不一定有名字，但它知道你<strong>喜歡什麼</strong>、<strong>害怕什麼</strong>、<strong>在人群中怎麼移動</strong>。<br><br>
          這份測驗不問你「是哪種動物」——它問的是<strong>你怎麼活著</strong>。<br>
          然後，幫你把那個輪廓，描出來。
        </p>
      </div>
      <div class="intro-equation">
        <span class="eq-item"><span class="eq-num">1</span><span class="eq-label">個你</span></span>
        <span class="eq-op">×</span>
        <span class="eq-item"><span class="eq-num">10</span><span class="eq-label">個問題</span></span>
        <span class="eq-op">=</span>
        <span class="eq-item"><span class="eq-num">∞</span><span class="eq-label">種組合</span></span>
      </div>
      <button class="start-btn" onclick="startQuiz()">▶ &nbsp; 調色開始</button>
      <div class="start-hint">選擇直覺反應，不必過度思考</div>
      <button class="test-btn" onclick="randomTest()">🎲 隨機測試（跳至結果）</button>
    </div>`;
}

function startQuiz(){
  introShown=true;
  render();
}

function randomTest(){
  answers = questions.map(q => Math.floor(Math.random() * q.options.length));
  current = questions.length;
  introShown = true;
  render();
}


function render(){
  if(!introShown){showIntro();return;}
  document.getElementById("progress").style.width=(current/questions.length*100)+"%";
  if(current>=questions.length){showResult();return;}
  const q=questions[current],sel=answers[current];
  document.getElementById("content").innerHTML=`
    <div class="question-block">
      <div class="q-num">Q${current+1} / ${questions.length}</div>
      <div class="q-part">${q.icon} ${q.part}</div>
      <div class="q-text">${q.text}</div>
      <div class="options-grid">
        ${q.options.map((o,i)=>`
          <button class="opt-btn${sel===i?" selected":""}" onclick="selectOpt(${i})">
            <span class="opt-letter">${["A","B","C","D"][i]}</span>
            <span class="opt-text">${o.label}</span>
          </button>`).join("")}
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="prev()" ${current===0?"disabled":""}>← 上一題</button>
      </div>
    </div>`;
}

function selectOpt(i){
  answers[current]=i;
  setTimeout(()=>{current++;render();},260);
}
function prev(){if(current>0){current--;render();}}

function showResult(){
  document.getElementById("progress").style.width="100%";
  const parts=questions.map((q,i)=>({
    icon:q.icon,part:q.part,
    chosen:q.options[answers[i]].label,
    result:q.options[answers[i]].result,
    layer:q.options[answers[i]].layer
  }));

  // 收集這次選了哪些layer key
  const activeLayers = new Set(["body","head"]);
  parts.forEach(p=>{ if(p.layer) activeLayers.add(p.layer); });
  // horn_standear 取代所有耳朵圖層
  if(activeLayers.has("horn_standear")){
    activeLayers.delete("ear_dog");
    activeLayers.delete("ear_cat");
    activeLayers.delete("ear_deer");
    activeLayers.delete("ear_bear");
  }

  // 依照PSD順序（底→頂）過濾出要顯示的圖層
  const imgs = LAYER_ORDER
    .filter(k => activeLayers.has(k))
    .map(k => LAYERS[k] ? `<img src="${LAYERS[k]}" alt="${k}">` : "")
    .join("");

  // 拉線標示設定：[部位key前綴, canvas內的x%, y%, 標示在左or右]
  const ANNO_DEFS = [
    { prefix:"horn",  side:"right", cx:0.72, cy:0.12 },
    { prefix:"ear",   side:"right", cx:0.76, cy:0.22 },
    { prefix:"eye",   side:"left",  cx:0.28, cy:0.28 },
    { prefix:"nose",  side:"left",  cx:0.30, cy:0.38 },
    { prefix:"tail",  side:"right", cx:0.62, cy:0.72 },
  ];
  const partKeyMap = { horn:"角", ear:"耳朵", eye:"眼睛", nose:"鼻子", tail:"尾巴" };

  // 為每個部位找 result 文字
  const partResults = {};
  parts.forEach(p => {
    if(p.part==="角")   partResults["horn"] = p.result;
    if(p.part==="耳朵") partResults["ear"]  = p.result;
    if(p.part==="眼睛") partResults["eye"]  = p.result;
    if(p.part==="鼻子") partResults["nose"] = p.result;
    if(p.part==="尾巴") partResults["tail"] = p.result;
  });

  // 產生 SVG 線 + HTML 標籤
  const W = 400, H = 400;
  let svgLines = "";
  let labelDivs = "";
  ANNO_DEFS.forEach(function(def) {
    const result = partResults[def.prefix];
    if(!result) return;
    const px = def.cx * W;
    const py = def.cy * H;
    const lx = def.side === "left" ? -80 : 480;
    const ly = py;
    const mx = def.side === "left" ? -20 : 420;
    const color = "rgba(160,150,240,0.7)";
    svgLines += '<polyline points="' + px + ',' + py + ' ' + mx + ',' + ly + '" stroke="' + color + '" stroke-width="1" fill="none"/>';
    svgLines += '<circle cx="' + px + '" cy="' + py + '" r="3" fill="' + color + '"/>';
    svgLines += '<line x1="' + mx + '" y1="' + ly + '" x2="' + lx + '" y2="' + ly + '" stroke="' + color + '" stroke-width="1"/>';
    const topPct = (py/H*100).toFixed(1) + "%";
    const labelStyle = def.side === "left"
      ? "right:calc(100% + 8px); top:" + topPct + "; transform:translateY(-50%); text-align:right;"
      : "left:calc(100% + 8px); top:" + topPct + "; transform:translateY(-50%); text-align:left;";
    labelDivs += '<div class="anno-label" style="' + labelStyle + '">' + partKeyMap[def.prefix] + '<br><span style="color:var(--text);font-size:12px;">' + result + '</span></div>';
  });
  const annoLabels = '<svg viewBox="-120 0 640 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:400px;height:400px;overflow:visible;pointer-events:none;">' + svgLines + '</svg>' + labelDivs;

  document.getElementById("content").innerHTML=`
    <div class="result-block">
      <div class="cert-label">FurSOULna CERTIFICATE</div>
      <div class="result-title">你的靈魂獸設</div>
      <div class="result-sub">由10個特質組合而成，獨一無二</div>
      <div class="canvas-outer" id="fursona-outer">
        <div class="canvas-wrap" id="fursona-canvas">${imgs}</div>
        ${annoLabels}
      </div>
      <div class="name-input-wrap">
        <label class="name-label">為你的靈魂獸設命名</label>
        <input class="name-input" id="fursona-name" type="text" placeholder="輸入名字（選填）" maxlength="20">
      </div>
      <div class="action-row">
        <button class="save-btn" onclick="saveImage()">⬇ 儲存圖片</button>
        <button class="share-btn" onclick="copyShareText()">🔗 複製分享文字</button>
      </div>
      <div class="parts-list">
        ${parts.map(p=>`
          <div class="part-row">
            <span class="part-icon">${p.icon}</span>
            <span class="part-name">${p.part}</span>
            <span class="part-answer">${p.chosen}</span>
            <span class="part-value">→ ${p.result}</span>
          </div>`).join("")}
      </div>
      <button class="restart-btn" onclick="restart()">↺ 再測一次</button>
    </div>`;
  // store parts for share
  window._resultParts = parts;
}

function saveImage(){
  const wrap = document.getElementById("fursona-canvas");
  const name = (document.getElementById("fursona-name")||{}).value||"";
  const size = 800;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  const imgs = wrap.querySelectorAll("img");
  let loaded = 0;
  function drawAll(){
    ctx.clearRect(0,0,size,size);
    imgs.forEach(img=>{
      ctx.drawImage(img,0,0,size,size);
    });
    if(name){
      ctx.font = "bold 36px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.textAlign = "center";
      const tw = ctx.measureText(name).width;
      ctx.fillRect(size/2-tw/2-16, size-72, tw+32, 52);
      ctx.fillStyle = "#1a1a1a";
      ctx.fillText(name, size/2, size-36);
    }
    const a = document.createElement("a");
    a.download = (name||"fursona")+".png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  }
  // wait for all images to be ready
  if(imgs.length===0){drawAll();return;}
  imgs.forEach(img=>{
    if(img.complete){loaded++;if(loaded===imgs.length)drawAll();}
    else{img.onload=()=>{loaded++;if(loaded===imgs.length)drawAll();};}
  });
}

function copyShareText(){
  const name = (document.getElementById("fursona-name")||{}).value||"";
  const parts = window._resultParts||[];
  const lines = parts.map(p=>`${p.icon} ${p.part}：${p.result}`).join("\n");
  const header = name ? `【${name} 的靈魂獸設調色盤】` : "【我的靈魂獸設調色盤】";
  const text = `${header}\n${lines}\n\n#靈魂獸設調色盤 #Furry #FurryArt`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector(".share-btn");
    const orig = btn.textContent;
    btn.textContent="✓ 已複製！";
    setTimeout(()=>{btn.textContent=orig;},2000);
  }).catch(()=>{
    alert(text);
  });
}

function restart(){current=0;answers=[];introShown=false;render();}
render();
</script>
</body>
</html>
